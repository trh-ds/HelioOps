apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helioops-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - helioops.example.com
      secretName: helioops-tls
  rules:
    - host: helioops.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: helioops-backend
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: helioops-backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: helioops-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: helioops-frontend
                port:
                  number: 3000