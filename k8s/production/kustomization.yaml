# Production overlay — 3 replicas, resource-hardened, rollout strategy

apiVersion: apps/v1
kind: Deployment
metadata:
  name: helioops-backend
  labels:
    app: helioops
    component: backend
    env: production
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    spec:
      containers:
        - name: backend
          env:
            - name: HELIOOPS_LOG_LEVEL
              value: "WARNING"
            - name: HELIOOPS_LOG_FORMAT
              value: "json"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 2Gi