apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helioops-backend-production
  namespace: argocd
  labels:
    app: helioops
    component: backend
    env: production
spec:
  project: default
  source:
    repoURL: https://github.com/trh-ds/HelioOps
    targetRevision: HEAD
    path: k8s/production
  destination:
    server: https://kubernetes.default.svc
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true